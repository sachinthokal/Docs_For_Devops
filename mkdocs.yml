site_name: DevOpsVaultX Docs
site_url: https://docs.devopsvaultx.com/

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.indexes
    - search.suggest
    - search.highlight
    - toc.follow

  palette:
    scheme: default
    primary: indigo
    accent: indigo
    
# Setup explicit search plugin configuration
plugins:
  - search

# Setup custom styling and overrides
extra_css:
  - stylesheets/extra.css

# Professional footer setup without default generator link
copyright: |
  &copy; 2026 <strong>DevOpsVaultX</strong> | <span style="color: #10b981;">Code. Deploy. Automate. Repeat.</span> ❤️

nav:
  - Home: index.md
  - Linux: 
    - linux/index.md
    - Architecture: linux/architecture.md
    - Installation: linux/installation.md
    - Commands: linux/commands.md

  - Docker: 
    - docker/index.md
    - Architecture: docker/architecture.md
    - Installation: docker/installation.md
    - Commands: docker/commands.md